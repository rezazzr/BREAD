# Table 2: Standard APO on GPT-3.5-turbo, Penguins task.
# Paper Section 4.1.

task_name: bigbench
search_algo: tras
print_log: true
log_dir: ./logs/

init_prompt: |
  Answer questions about a table of penguins and their attributes

task_setting:
  train_size: 40
  eval_size: 30
  test_size: 79
  seed: 1909
  data_dir: ./datasets/penguins_in_a_table.json
  post_instruction: false

base_model_setting:
  model_type: openai
  model_name: gpt-3.5-turbo
  temperature: 0.0
  max_tokens: 4096
  api_key: null
  device: null
  model_path: null
  max_parallel_requests: 5

optim_model_setting:
  model_type: openai
  model_name: gpt-4o
  temperature: 1.0
  max_tokens: 4096
  api_key: null
  device: null
  model_path: null
  max_parallel_requests: 5

search_setting:
  iteration_num: 15
  expand_width: 3
  depth_limit: 8
  min_depth: 2
  w_exp: 2.5
  beam_width: 3

world_model_setting:
  train_shuffle: true
  num_new_prompts: 1
  train_batch_size: 5
  eval_batch_size: 5
  test_batch_size: 5
  regularization_warmup_depth: 3
  mcsa_samples: 6
