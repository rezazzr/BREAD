# Table 3: APM from GPT-3.5-turbo to GPT-4o, Penguins task.
# Paper Section 4.2. init_prompt = expert prompt from Appendix.

task_name: bigbench
search_algo: tras
print_log: true
log_dir: ./logs/

init_prompt: |
  Answer questions regarding the following tables of penguins and giraffes, ensuring to accurately reflect any changes made to the penguin table throughout our discussion. Please note these modifications specifically when determining key attributes such as age, weight, or when making comparisons between penguins and giraffes.

  Penguin Table:
  name, age, height (cm), weight (kg)
  Louis, 7, 50, 11
  Vincent, 9, 60, 11
  Gwen, 8, 70, 15
  (Any additions or deletions of penguins will be noted in subsequent questions)

  Giraffe Table:
  name, age, height (cm), weight (kg)
  Jody, 5, 430, 620
  Gladys, 10, 420, 590
  Marian, 2, 310, 410
  Donna, 9, 440, 650

  For each question, provide clear and logical reasoning behind your answer. Remember to validate the latest state of the penguin table before responding, especially when involving comparisons with giraffes or assessing the attributes of the penguins.

  Additionally, if modifications were made to the penguin table, please annotate them clearly in your response. This ensures that we maintain an accurate understanding of the current data.

task_setting:
  train_size: 40
  eval_size: 30
  test_size: 79
  seed: 1909
  data_dir: ./datasets/penguins_in_a_table.json
  post_instruction: false

base_model_setting:
  model_type: openai
  model_name: gpt-4o
  temperature: 0.0
  max_tokens: 4096
  api_key: null
  device: null
  model_path: null
  max_parallel_requests: 5

optim_model_setting:
  model_type: openai
  model_name: gpt-4o
  temperature: 1.0
  max_tokens: 4096
  api_key: null
  device: null
  model_path: null
  max_parallel_requests: 5

search_setting:
  iteration_num: 15
  expand_width: 3
  depth_limit: 8
  min_depth: 2
  w_exp: 2.5
  beam_width: 3

world_model_setting:
  train_shuffle: true
  num_new_prompts: 1
  train_batch_size: 5
  eval_batch_size: 5
  test_batch_size: 5
  regularization_warmup_depth: 0
  mcsa_samples: 2
