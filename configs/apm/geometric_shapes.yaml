# Table 3: APM from GPT-3.5-turbo to GPT-4o, Geometric Shapes task.
# Paper Section 4.2. init_prompt = expert prompt from Appendix.

task_name: bigbench
search_algo: tras
print_log: true
log_dir: ./logs/

init_prompt: |
  Name the geometric shape accurately based on the provided SVG path. Carefully analyze the properties of the path, including the number of sides, angles, lengths of sides, and overall configuration, to determine the most appropriate geometric shape. Your options should encompass a wide variety of shapes, ranging from simple polygons to circles. Ensure that the model considers all relevant attributes before selecting the most suitable shape from the available options.
  Options: (A) circle, (B) equilateral triangle, (C) regular hexagon, (D) rhombus, (E) line segment, (F) octagon, (G) pentagon, (H) rectangle, (I) sector, (J) square, (K) trapezoid, (L) oval

task_setting:
  train_size: 150
  eval_size: 100
  test_size: 200
  seed: 1909
  data_dir: ./datasets/geometric_shapes.json
  post_instruction: false

base_model_setting:
  model_type: openai
  model_name: gpt-4o
  temperature: 0.0
  max_tokens: 4096
  api_key: null
  device: null
  model_path: null
  max_parallel_requests: 5

optim_model_setting:
  model_type: openai
  model_name: gpt-4o
  temperature: 1.0
  max_tokens: 4096
  api_key: null
  device: null
  model_path: null
  max_parallel_requests: 5

search_setting:
  iteration_num: 15
  expand_width: 3
  depth_limit: 8
  min_depth: 2
  w_exp: 2.5
  beam_width: 3

world_model_setting:
  train_shuffle: true
  num_new_prompts: 1
  train_batch_size: 5
  eval_batch_size: 5
  test_batch_size: 5
  regularization_warmup_depth: 0
  mcsa_samples: 2
