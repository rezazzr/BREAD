###############################################################################
#  D E B U G   A P E   C O N F I G
#  Uses the fake DebugModel — no API calls, runs the full APE pipeline
#  instantly for testing console output, logging, plots, and metrics.
#
#  Run:  NO_WANDB=1 python src/main.py -c configs/debug_ape.yaml
###############################################################################

task_name: cb
search_algo: ape
print_log: true
log_dir: ./logs/

###############################################################################
#  T A S K   S P L I T S   &   D A T A
###############################################################################
task_setting:
  train_size: 10                  # demos are sampled from this pool
  eval_size: 10                   # used to score each candidate
  test_size: 10                   # final evaluation of best candidate
  seed: 42
  data_dir: null
  post_instruction: true

###############################################################################
#  B A S E   M O D E L   (scores candidate prompts on eval/test sets)
###############################################################################
base_model_setting:
  model_type: debug
  model_name: debug-base
  temperature: 0.0
  max_tokens: 100
  latency: 0.0

###############################################################################
#  O P T I M I S E R   M O D E L   (generates candidate instructions)
###############################################################################
optim_model_setting:
  model_type: debug
  model_name: debug-optim
  temperature: 1.0
  max_tokens: 200
  latency: 0.0

###############################################################################
#  W O R L D   M O D E L   (APE generation & evaluation)
###############################################################################
world_model_setting:
  num_subsamples: 3               # distinct generation queries (different demo subsets)
  num_demos: 3                    # input-output examples per query
  num_prompts_per_subsample: 4    # candidates per query (total = 3 × 4 = 12)
  generation_mode: "forward"      # "forward" | "insert" | "insert_v2"
  eval_batch_size: 5
  test_batch_size: 5
